<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花阳美苑</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 平板背景 -->
        <div class="tablet-frame">
            <!-- 平板屏幕 -->
            <div class="screen" id="screen">
                <!-- 状态栏 -->
                <div class="status-bar">
                    <div class="time-display">
                        <div class="time" id="time">19:00</div>
                        <div class="date" id="date">2026年04月17日</div>
                    </div>
                    <div class="status-icons">
                        <span>5G</span>
                        <span class="signal">📶</span>
                        <span class="battery">81%</span>
                    </div>
                </div>

                <!-- 桌面图标 -->
                <div class="desktop" id="desktop">
                    <div class="apps-grid">
                        <div class="app" onclick="openApp('wechat')">
                            <div class="app-icon wechat">💬</div>
                            <div class="app-name">微信</div>
                        </div>
                        <div class="app" onclick="openApp('worldbook')">
                            <div class="app-icon worldbook">📖</div>
                            <div class="app-name">世界书</div>
                        </div>
                        <div class="app" onclick="openApp('theme')">
                            <div class="app-icon theme">🎨</div>
                            <div class="app-name">主题壁纸</div>
                        </div>
                        <div class="app" onclick="openApp('settings')">
                            <div class="app-icon settings">⚙️</div>
                            <div class="app-name">AI设置</div>
                        </div>
                    </div>
                </div>

                <!-- 底部导航 -->
                <div class="bottom-nav">
                    <div class="nav-btn" onclick="changeTheme('sun')">☀️</div>
                    <div class="nav-btn" onclick="changeTheme('moon')">🌙</div>
                    <div class="nav-btn" onclick="openApp('profile')">👤</div>
                </div>
            </div>
        </div>

        <!-- 应用窗口 -->
        
        <!-- 微信应用 -->
        <div class="app-window" id="wechat">
            <div class="app-header">
                <div class="back-btn" onclick="closeApp()">←</div>
                <div class="app-title">微信</div>
                <div class="add-btn" onclick="showCharEditor()">+</div>
            </div>
            <div class="app-content">
                <div class="chat-list">
                    <!-- 聊天列表会动态生成 -->
                </div>
            </div>
        </div>

        <!-- 世界书应用 -->
        <div class="app-window" id="worldbook">
            <div class="app-header">
                <div class="back-btn" onclick="closeApp()">←</div>
                <div class="app-title">世界书</div>
                <div class="add-btn" onclick="importWorldbook()">+</div>
            </div>
            <div class="app-content">
                <div class="worldbook-list">
                    <div class="worldbook-item">
                        <h3>默认世界</h3>
                        <p>基础设定</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主题壁纸应用 -->
        <div class="app-window" id="theme">
            <div class="app-header">
                <div class="back-btn" onclick="closeApp()">←</div>
                <div class="app-title">主题壁纸</div>
            </div>
            <div class="app-content">
                <div class="theme-list">
                    <div class="theme-item" onclick="setTheme('blue')">经典蓝白</div>
                    <div class="theme-item" onclick="setTheme('dark')">极夜黑</div>
                    <div class="theme-item" onclick="setTheme('pink')">樱花粉</div>
                </div>
            </div>
        </div>

        <!-- AI设置应用 -->
        <div class="app-window" id="settings">
            <div class="app-header">
                <div class="back-btn" onclick="closeApp()">←</div>
                <div class="app-title">AI设置</div>
            </div>
            <div class="app-content">
                <div class="setting-item">
                    <label>AI模型：</label>
                    <select>
                        <option>DeepSeek-V3</option>
                        <option>Gemini 1.5 Pro</option>
                        <option>GPT-4o</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>API密钥：</label>
                    <input type="password" placeholder="输入API密钥">
                </div>
                <button class="save-btn" onclick="saveSettings()">保存设置</button>
            </div>
        </div>

        <!-- 个人资料 -->
        <div class="app-window" id="profile">
            <div class="app-header">
                <div class="back-btn" onclick="closeApp()">←</div>
                <div class="app-title">个人资料</div>
            </div>
            <div class="app-content">
                <div class="profile-info">
                    <div class="avatar">👤</div>
                    <h3>花晓</h3>
                    <p>女，认认真真，战战兢兢</p>
                </div>
            </div>
        </div>

        <!-- 角色编辑器 -->
        <div class="modal" id="charEditor">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>创建角色</h3>
                    <div class="close-btn" onclick="closeCharEditor()">×</div>
                </div>
                <div class="modal-body">
                    <input type="text" id="charName" placeholder="角色名字">
                    <textarea id="charPrompt" placeholder="角色设定"></textarea>
                    <button onclick="saveCharacter()">保存角色</button>
                </div>
            </div>
        </div>

        <!-- 通知 -->
        <div class="notification" id="notification"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
