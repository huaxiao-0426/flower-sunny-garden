<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花阳美苑 OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container">
        <div class="screen" id="main-screen">
            
            <div class="status-bar">
                <span id="real-time">15:00</span>
                <div class="status-right">5G 📶 81% 🔋</div>
            </div>

            <div id="desktop" class="layer">
                <div class="clock-widget">
                    <h1 id="big-time">15:12</h1>
                    <p id="big-date">2026年04月17日</p >
                </div>
                
                <div class="app-grid">
                    <div class="app-item" onclick="openApp('wechat')">
                        <div class="icon icon-wechat">💬</div>
                        <span>微信</span>
                    </div>
                    <div class="app-item" onclick="openApp('worldbook')">
                        <div class="icon icon-world">📖</div>
                        <span>世界书</span>
                    </div>
                    <div class="app-item" onclick="openApp('settings')">
                        <div class="icon icon-settings">⚙️</div>
                        <span>AI设置</span>
                    </div>
                    <div class="app-item" onclick="openApp('theme')">
                        <div class="icon icon-theme">🎨</div>
                        <span>主题壁纸</span>
                    </div>
                </div>
            </div>

            <div id="app-wechat" class="app-window layer hidden">
                <div class="app-header">
                    <button class="back-btn" onclick="closeApp()">⇠</button>
                    <span id="chat-target">微信 (待机)</span>
                    <button class="action-btn" onclick="toggleCharEditor()">👤+</button>
                </div>
                <div id="char-editor" class="editor-panel hidden">
                    <input type="text" id="char-name" placeholder="角色名字 (如: 花阳)">
                    <textarea id="char-prompt" placeholder="角色人设描述..."></textarea>
                    <button onclick="saveChar()">确定设定</button>
                </div>
                <div id="chat-box" class="chat-content"></div>
                <div class="input-bar">
                    <input type="text" id="user-msg" placeholder="说点什么...">
                    <button onclick="sendChat()">发送</button>
                </div>
            </div>

            <div id="app-settings" class="app-window layer hidden">
                <div class="app-header">
                    <button class="back-btn" onclick="closeApp()">⇠</button>
                    <span>API 设置</span>
                </div>
                <div class="config-body">
                    <label>接口地址</label>
                    <input type="text" id="api-url" value="https://api.deepseek.com/v1">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="在此输入你的 Key">
                    <label>选择模型</label>
                    <select id="model-select">
                        <option value="deepseek-chat">DeepSeek-V3</option>
                        <option value="deepseek-reasoner">DeepSeek-R1</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    </select>
                    <button class="save-btn" onclick="closeApp()">保存并返回</button>
                </div>
            </div>

            <div class="dock">
                <div class="dock-item">☀️</div>
                <div class="dock-item">🌙</div>
                <div class="dock-item" onclick="openApp('wechat')">💬</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
