<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花阳美苑</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="responsive-container">
        <div class="phone-case">
            <div class="screen" id="main-screen">
                <!-- 状态栏 - 修改为顶部状态栏 -->
                <div class="status-bar">
                    <div class="left-status">
                        <span>5G</span>
                        <span class="signal">📶</span>
                    </div>
                    <div class="right-status">
                        <span class="battery">81%</span>
                    </div>
                </div>

                <!-- 主桌面 -->
                <div id="desktop" class="desktop">
                    <!-- 时间日期居中显示 -->
                    <div class="time-date-container">
                        <div class="time-large" id="real-time">19:00</div>
                        <div class="date-small" id="real-date">2026年04月17日</div>
                    </div>
                    
                    <!-- 应用网格 -->
                    <div class="icon-grid">
                        <div class="app-icon" data-app="wechat">
                            <div class="icon-box wechat-bg">💬</div>
                            <span>微信</span>
                        </div>
                        <div class="app-icon" data-app="worldbook">
                            <div class="icon-box worldbook-bg">📖</div>
                            <span>世界书</span>
                        </div>
                        <div class="app-icon" data-app="theme-wallpaper">
                            <div class="icon-box theme-bg">🎨</div>
                            <span>主题壁纸</span>
                        </div>
                        <div class="app-icon" data-app="settings">
                            <div class="icon-box settings-bg">⚙️</div>
                            <span>AI设置</span>
                        </div>
                    </div>

                    <!-- 底部导航 -->
                    <div class="bottom-nav">
                        <div class="nav-icon" data-theme="sunny">☀️</div>
                        <div class="nav-icon" data-theme="midnight">🌙</div>
                        <div class="nav-icon" data-app="profile">👤</div>
                    </div>
                </div>

                <!-- 微信应用 -->
                <div id="app-wechat" class="app-window">
                    <div class="app-header">
                        <button class="back-btn" data-close>⬅</button>
                        <span>微信</span>
                        <button class="add-char-btn" id="add-char-btn">👤+</button>
                    </div>
                    
                    <div class="wechat-content">
                        <!-- 聊天列表 -->
                        <div id="chat-list" class="chat-list">
                            <!-- 聊天列表会动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 角色编辑器 -->
                    <div id="char-editor" class="char-editor">
                        <div class="char-editor-header">
                            <button class="back-btn" id="close-char-editor">⬅</button>
                            <span>角色管理</span>
                        </div>
                        <div class="char-editor-tabs">
                            <button class="editor-tab active" data-editor-tab="ai">AI角色</button>
                            <button class="editor-tab" data-editor-tab="user">我的角色</button>
                        </div>
                        
                        <!-- AI角色编辑 -->
                        <div id="ai-char-tab" class="editor-tab-content active">
                            <input type="text" id="char-name" placeholder="角色名字...">
                            <textarea id="char-prompt" placeholder="角色人设(Prompt)..."></textarea>
                            <div class="char-actions">
                                <button id="save-ai-char-btn">保存AI角色</button>
                            </div>
                        </div>
                        
                        <!-- 用户角色编辑 -->
                        <div id="user-char-tab" class="editor-tab-content">
                            <input type="text" id="user-char-name" placeholder="我的角色名字...">
                            <textarea id="user-char-prompt" placeholder="我的人设..."></textarea>
                            <div class="char-actions">
                                <button id="save-user-char-btn">保存我的角色</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 世界书应用 -->
                <div id="app-worldbook" class="app-window">
                    <div class="app-header">
                        <button class="back-btn" data-close>⬅</button>
                        <span>世界书</span>
                    </div>
                    
                    <div class="worldbook-container">
                        <div id="worldbook-list" class="worldbook-list">
                            <!-- 世界书列表会动态生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 主题壁纸应用 -->
                <div id="app-theme-wallpaper" class="app-window">
                    <div class="app-header">
                        <button class="back-btn" data-close>⬅</button>
                        <span>主题壁纸</span>
                    </div>
                    <div class="theme-wallpaper-container">
                        <div class="section">
                            <h3>主题设置</h3>
                            <div class="theme-list">
                                <button class="theme-btn" data-theme="default">经典蓝白</button>
                                <button class="theme-btn" data-theme="dark">极夜黑</button>
                                <button class="theme-btn" data-theme="sakura">樱花粉</button>
                                <button class="theme-btn" data-theme="midnight">午夜蓝</button>
                                <button class="theme-btn" data-theme="sunny">阳光橙</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- AI设置应用 -->
                <div id="app-settings" class="app-window">
                    <div class="app-header">
                        <button class="back-btn" data-close>⬅</button>
                        <span>AI设置</span>
                    </div>
                    <div class="settings-container">
                        <div class="setting-item">
                            <label>选择AI模型</label>
                            <select id="model-select">
                                <option value="deepseek-chat">DeepSeek-V3</option>
                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                <option value="gpt-4o">GPT-4o</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>API 地址</label>
                            <input type="text" id="api-url" placeholder="https://api.deepseek.com/v1" value="https://api.deepseek.com/v1">
                        </div>
                        <div class="setting-item">
                            <label>API Key</label>
                            <input type="password" id="api-key" placeholder="输入 API Key">
                        </div>
                        <button class="save-btn" id="save-settings-btn">保存设置</button>
                    </div>
                </div>
                
                <!-- 个人资料 -->
                <div id="app-profile" class="app-window">
                    <div class="app-header">
                        <button class="back-btn" data-close>⬅</button>
                        <span>个人资料</span>
                    </div>
                    <div class="profile-container">
                        <div class="profile-avatar">👤</div>
                        <h3>花晓</h3>
                        <div class="profile-stats">
                            <div class="stat">
                                <span id="char-count">2</span>
                                <small>角色</small>
                            </div>
                            <div class="stat">
                                <span id="moment-count">0</span>
                                <small>动态</small>
                            </div>
                            <div class="stat">
                                <span id="worldbook-count">0</span>
                                <small>世界书</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="home-indicator"></div>
            </div>
        </div>
    </div>
    
    <!-- 通知系统 -->
    <div id="notification" class="notification"></div>
    
    <script src="script.js"></script>
</body>
</html>
