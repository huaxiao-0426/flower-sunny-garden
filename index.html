<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花阳美苑</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-case">
        <div class="screen" id="main-screen">
            <div class="status-bar">
                <span id="real-time">00:00</span>
                <div class="status-icons">📶 🔋</div>
            </div>

            <div id="desktop" class="desktop">
                <div class="icon-grid">
                    <div class="app-icon" onclick="openApp('wechat')">
                        <div class="icon-box wechat-bg">💬</div>
                        <span>微信</span>
                    </div>
                    <div class="app-icon" onclick="openApp('settings')">
                        <div class="icon-box settings-bg">⚙️</div>
                        <span>API设置</span>
                    </div>
                    <div class="app-icon" onclick="openApp('themes')">
                        <div class="icon-box theme-bg">🎨</div>
                        <span>主题</span>
                    </div>
                </div>
            </div>

            <div id="app-wechat" class="app-window hidden">
                <div class="app-header">
                    <button class="back-btn" onclick="closeApp()">⬅</button>
                    <span id="chat-title">微信 (花阳美苑)</span>
                    <button class="add-char-btn" onclick="toggleCharEditor()">👤+</button>
                </div>
                <div id="char-editor" class="char-editor hidden">
                    <input type="text" id="char-name" placeholder="角色名字...">
                    <textarea id="char-prompt" placeholder="角色人设(Prompt)..."></textarea>
                    <button onclick="saveCharacter()">保存角色</button>
                </div>
                <div id="chat-window" class="chat-window"></div>
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="发送消息...">
                    <button id="send-btn">➤</button>
                </div>
            </div>

            <div id="app-settings" class="app-window hidden">
                <div class="app-header">
                    <button class="back-btn" onclick="closeApp()">关闭</button>
                    <span>接口配置</span>
                </div>
                <div class="config-form">
                    <label>API 地址</label>
                    <input type="text" id="api-url" placeholder="https://api.deepseek.com/v1">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="输入 Key">
                    <label>选择模型</label>
                    <select id="model-select">
                        <optgroup label="DeepSeek">
                            <option value="deepseek-chat">DeepSeek-V3</option>
                            <option value="deepseek-reasoner">DeepSeek-R1 (推理)</option>
                        </optgroup>
                        <optgroup label="Gemini">
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (最新)</option>
                        </optgroup>
                        <optgroup label="OpenAI">
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gpt-4o-mini">GPT-4o-mini</option>
                        </optgroup>
                    </select>
                    <button class="save-btn" onclick="closeApp()">保存配置</button>
                </div>
            </div>

            <div id="app-themes" class="app-window hidden">
                <div class="app-header"><button class="back-btn" onclick="closeApp()">关闭</button><span>主题切换</span></div>
                <div class="theme-list">
                    <button onclick="changeTheme('default')">经典蓝白</button>
                    <button onclick="changeTheme('dark')">极夜黑</button>
                    <button onclick="changeTheme('sakura')">樱花粉</button>
                </div>
            </div>

            <div class="home-indicator"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
